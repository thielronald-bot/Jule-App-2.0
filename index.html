<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0f0a">
    <title>Jule - Die WürfelApp</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #1a0f0a; 
            color: #f8f9fa; 
            font-family: 'Inter', sans-serif; 
            touch-action: manipulation; 
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-repeat: repeat;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #666; border-radius: 10px; }
        input, button { outline: none !important; -webkit-tap-highlight-color: transparent; }
        .player-card { background-color: rgba(26, 15, 10, 0.95); border: 1px solid #444; transition: all 0.2s ease; }
        .player-out { opacity: 0.4; filter: grayscale(0.8); }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registriert'))
                    .catch(err => console.log('SW Registrierung fehlgeschlagen', err));
            });
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('game');
            const [players, setPlayers] = useState(() => {
                try { return JSON.parse(localStorage.getItem('jule_players')) || []; } catch(e) { return []; }
            });
            const [history, setHistory] = useState(() => {
                try { return JSON.parse(localStorage.getItem('jule_history')) || []; } catch(e) { return []; }
            });

            const [newPlayerName, setNewPlayerName] = useState('');
            const [selectingWinnerFor, setSelectingWinnerFor] = useState(null);
            const [editingPlayer, setEditingPlayer] = useState(null);
            const [editValue, setEditValue] = useState('');

            useEffect(() => {
                localStorage.setItem('jule_players', JSON.stringify(players));
                localStorage.setItem('jule_history', JSON.stringify(history));
            }, [players, history]);

            const addPlayer = () => {
                if (newPlayerName.trim()) {
                    setPlayers([...players, { id: Date.now(), name: newPlayerName.trim(), isOut: false }]);
                    setNewPlayerName('');
                }
            };

            const togglePlayerStatus = (id) => {
                setPlayers(players.map(p => p.id === id ? { ...p, isOut: !p.isOut } : p));
            };

            const confirmLoss = (winnerId, winnerName) => {
                const loser = selectingWinnerFor;
                const currentlyActiveIds = players.filter(p => !p.isOut).map(p => p.id);
                
                const newEntry = {
                    id: Date.now(),
                    loserId: loser.id,
                    loserName: loser.name,
                    winnerId: winnerId,
                    winnerName: winnerName,
                    activeIds: currentlyActiveIds, 
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                setHistory([newEntry, ...history]);
                setSelectingWinnerFor(null);
            };

            const saveEdit = () => {
                const name = editValue.trim();
                if (name && editingPlayer) {
                    setPlayers(players.map(p => p.id === editingPlayer.id ? {...p, name} : p));
                    setHistory(history.map(h => ({
                        ...h,
                        loserName: h.loserId === editingPlayer.id ? name : h.loserName,
                        winnerName: h.winnerId === editingPlayer.id ? name : h.winnerName
                    })));
                    setEditingPlayer(null);
                }
            };

            const stats = useMemo(() => {
                const cost = 0.20;
                const results = players.map(p => ({ ...p, losses: 0, balance: 0 }));
                history.forEach(h => {
                    const activeInRound = h.activeIds || [];
                    const participantsCount = activeInRound.length;
                    
                    if (participantsCount > 0) {
                        results.forEach(p => {
                            if (activeInRound.includes(p.id)) {
                                if (p.id === h.loserId) {
                                    p.losses += 1;
                                    p.balance -= (participantsCount - 1) * cost;
                                } else {
                                    p.balance += cost;
                                }
                            }
                        });
                    }
                });
                return results;
            }, [players, history]);

            const shareWhatsApp = () => {
                const text = "🍻 *JULE ABRECHNUNG* 🍻\n\n" + 
                    stats.map(p => `• ${p.name}: *${p.balance.toFixed(2)}€* (${p.losses}x verloren)`).join("\n") +
                    `\n\n🕒 Stand: ${new Date().toLocaleTimeString()}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            if (view === 'rules') {
                return (
                    <div className="max-w-md mx-auto p-4 min-h-screen text-white">
                        <header className="mb-6 flex items-center gap-4">
                            <button onClick={() => setView('game')} className="p-2 bg-stone-800 rounded-lg text-stone-300">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            </button>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Spielregeln (Görlitz)</h1>
                        </header>
                        
                        <div className="space-y-6 text-stone-300 leading-relaxed overflow-y-auto max-h-[80vh] pr-2 custom-scrollbar pb-10">
                            <section>
                                <h2 className="text-emerald-400 font-black uppercase text-[10px] mb-2 tracking-widest">Ziel des Spiels</h2>
                                <p className="text-sm">Wer am Ende einer Runde als Letzter noch Deckel besitzt, verliert die Runde und muss gemäß Abrechnung (0,20€ pro Mitspieler) zahlen.</p>
                            </section>

                            <section>
                                <h2 className="text-emerald-400 font-black uppercase text-[10px] mb-2 tracking-widest">Vorbereitung</h2>
                                <p className="text-sm">Jeder Spieler nutzt 3 Würfel. Zu Beginn liegen 13 Bierdeckel („Alte Deckel“) im Stock.</p>
                            </section>

                            <section>
                                <h2 className="text-emerald-400 font-black uppercase text-[10px] mb-2 tracking-widest">Wertungen (Rangfolge)</h2>
                                <ul className="text-sm space-y-2 font-bold">
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Jule (4, 2, 1)</span> <span className="text-emerald-400">7 Deckel</span></li>
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Max (1, 1, X)</span> <span className="text-emerald-400">X Deckel</span></li>
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Harte (X, X, X)</span> <span className="text-emerald-400">3 Deckel</span></li>
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Folge (4, 5, 6)</span> <span className="text-emerald-400">2 Deckel</span></li>
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Zahlenwurf</span> <span className="text-emerald-400">1 Deckel</span></li>
                                    <li className="flex justify-between border-b border-stone-800 pb-1"><span>Pippi (2, 2, 1)</span> <span className="text-emerald-400">Niedrigster Wurf</span></li>
                                    <li className="flex justify-between text-red-400"><span>Wurf vom Tisch</span> <span>Gilt als Pippi</span></li>
                                </ul>
                            </section>

                            <section>
                                <h2 className="text-emerald-400 font-black uppercase text-[10px] mb-2 tracking-widest">Spielablauf</h2>
                                <div className="space-y-4 text-sm">
                                    <div>
                                        <p className="font-bold text-stone-100">Phase 1 (Verteilen):</p>
                                        <p>Es wird reihum gewürfelt. Der Spieler mit dem schlechtesten Wurf erhält Deckel aus dem Stock (Anzahl je nach bestem Wurf der Runde).</p>
                                        <p className="mt-2 bg-emerald-950/40 p-2 rounded border border-emerald-900/50"><b>KALTE:</b> Erhält ein Spieler bereits beim Verteilen alle 13 Deckel, ist dies eine „Kalte“. Die Runde endet sofort, Phase 2 entfällt.</p>
                                    </div>
                                    <div>
                                        <p className="font-bold text-stone-100">Phase 2 (Ausspielen):</p>
                                        <p>Sobald der Stock leer ist, spielen nur noch die Teilnehmer mit Deckeln. Wer gewinnt, gibt Deckel an den Verlierer ab. Wer keine Deckel mehr hat, ist „raus“.</p>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-stone-900/80 p-4 rounded-xl border border-stone-700">
                                <h2 className="text-red-400 font-black uppercase text-[10px] mb-1 tracking-widest">Ein- & Ausstieg</h2>
                                <p className="text-xs">Über das Tür-Symbol oben rechts auf der Spielerkarte kann ein Spieler jederzeit pausieren (AUS). Er wird dann in den folgenden Runden nicht mehr in die Abrechnung einbezogen, bis er wieder aktiviert wird (AN).</p>
                            </section>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto p-3 min-h-screen flex flex-col relative z-10 text-white">
                    <header className="flex justify-between items-center mb-4 pt-1">
                        <div>
                            <h1 className="text-2xl font-black italic uppercase leading-none tracking-tighter">Jule</h1>
                            <span className="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mt-0.5">Die KneipenApp</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('rules')} className="p-2.5 bg-stone-800 rounded-lg shadow border-b-2 border-stone-600 active:translate-y-0.5">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                            </button>
                            <button onClick={shareWhatsApp} className="p-2.5 bg-[#25D366] rounded-lg shadow border-b-2 border-green-700 active:translate-y-0.5">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.938 3.659 1.432 5.634 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            </button>
                            <button onClick={() => {if(confirm('Alles löschen?')) {localStorage.clear(); location.reload();}}} className="p-2.5 bg-red-950/40 rounded-lg text-red-300 font-bold text-[9px] uppercase border border-red-900/50">Reset</button>
                        </div>
                    </header>

                    <div className="flex gap-2 mb-4">
                        <input type="text" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addPlayer()} placeholder="Neuer Spieler..." className="flex-1 bg-stone-900/95 p-3 rounded-xl border border-stone-700 font-bold placeholder-stone-600 text-base" />
                        <button onClick={addPlayer} className="bg-stone-100 text-black px-6 rounded-xl font-black text-2xl border-b-2 border-stone-300 active:translate-y-0.5">+</button>
                    </div>

                    <div className="grid grid-cols-2 gap-3 mb-6">
                        {stats.map(p => (
                            <div key={p.id} className={`player-card p-3 rounded-2xl text-center shadow-lg flex flex-col justify-between relative ${p.isOut ? 'player-out' : ''}`}>
                                <button onClick={() => togglePlayerStatus(p.id)} className={`absolute top-2 right-2 p-1 rounded-md border ${p.isOut ? 'bg-red-900/40 border-red-700 text-red-400' : 'bg-emerald-900/40 border-emerald-700 text-emerald-400'}`}>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
                                    <span className="text-[6px] block font-black uppercase leading-none mt-0.5">{p.isOut ? 'AUS' : 'AN'}</span>
                                </button>
                                <div>
                                    <button onClick={() => {setEditingPlayer(p); setEditValue(p.name);}} className="text-sm uppercase font-black text-stone-100 underline decoration-stone-600 block w-full mb-1 tracking-tight truncate pr-6">
                                        {p.name}
                                    </button>
                                    <div className={`text-2xl font-mono font-black mb-2 ${p.balance >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                        {p.balance.toFixed(2)}
                                    </div>
                                </div>
                                <button onClick={() => !p.isOut && setSelectingWinnerFor(p)} disabled={p.isOut} className="w-full py-3 bg-stone-800 rounded-xl text-2xl font-black italic text-white active:bg-red-950 border border-stone-600 shadow-inner disabled:opacity-30">
                                    LOST
                                </button>
                            </div>
                        ))}
                    </div>

                    {editingPlayer && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-6 backdrop-blur-sm">
                            <div className="bg-stone-900 p-6 rounded-2xl w-full border border-stone-700">
                                <h2 className="font-black uppercase mb-4 text-center text-lg tracking-tight">Name ändern</h2>
                                <input type="text" value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus className="w-full bg-black p-4 rounded-xl mb-4 font-bold border border-stone-700 text-white text-xl" />
                                <div className="flex gap-2 text-sm">
                                    <button onClick={() => setEditingPlayer(null)} className="flex-1 py-3 bg-stone-800 rounded-xl font-bold uppercase text-stone-300">Abbruch</button>
                                    <button onClick={saveEdit} className="flex-1 py-3 bg-emerald-600 rounded-xl font-black uppercase border-b-2 border-emerald-700 active:translate-y-0.5">OK</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectingWinnerFor && (
                        <div className="fixed inset-0 bg-black/98 flex items-center justify-center z-50 p-4 backdrop-blur-md">
                            <div className="bg-stone-900 p-5 rounded-2xl w-full border border-stone-700">
                                <h2 className="text-stone-300 font-black uppercase mb-6 text-center text-base tracking-tight leading-tight">Wer hat gegen <span className="text-red-400 underline">{selectingWinnerFor.name}</span> gewonnen?</h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => confirmLoss('kalte', 'KALTE')} className="col-span-2 bg-emerald-900/40 py-4 rounded-xl font-black uppercase text-xl border-2 border-emerald-600 text-emerald-400 mb-2">KALTE</button>
                                    {players.filter(x => x.id !== selectingWinnerFor.id && !x.isOut).map(x => (
                                        <button key={x.id} onClick={() => confirmLoss(x.id, x.name)} className="bg-stone-800 py-5 rounded-xl font-black uppercase text-lg truncate px-2 border border-stone-600">{x.name}</button>
                                    ))}
                                </div>
                                <button onClick={() => setSelectingWinnerFor(null)} className="w-full mt-8 py-2.5 text-stone-500 text-[10px] font-black uppercase border border-stone-800 rounded-lg tracking-widest">Abbrechen</button>
                            </div>
                        </div>
                    )}

                    <div className="mt-4 pt-4 border-t border-stone-800">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="text-[10px] font-black uppercase text-stone-400 tracking-widest italic">Verlauf</h3>
                            <button onClick={() => setHistory(history.slice(1))} className="text-red-300 font-bold uppercase text-[10px] border border-red-900 px-2 py-1 rounded">Rückgängig</button>
                        </div>
                        <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-1 pb-10 text-stone-300">
                            {history.map(h => (
                                <div key={h.id} className="text-[10px] bg-stone-900/60 p-3 rounded-xl border border-stone-800 flex flex-col gap-0.5 italic shadow">
                                    <span className="text-stone-500 font-mono text-[10px]">{h.timestamp} Uhr ({h.activeIds?.length || 0} aktiv)</span>
                                    <div className="flex flex-wrap items-center gap-1 leading-snug">
                                        <b className="text-red-400 uppercase not-italic font-black text-xs">{h.loserName}</b> 
                                        <span className="text-stone-400">verliert gegen</span> 
                                        <b className="text-stone-100 uppercase not-italic font-black text-xs">{h.winnerName}</b>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
